<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0633c"/>
      <stop offset="55%" stop-color="#b65c38"/>
      <stop offset="100%" stop-color="#9e4c2c"/>
    </linearGradient>
  </defs>

  <!-- 印章本體 -->
  <rect width="512" height="512" rx="100" fill="url(#seal)"/>

  <!-- 內框（印章邊線，手工感：兩道粗細不一） -->
  <rect x="38" y="38" width="436" height="436" rx="62" fill="none"
    stroke="#f5f0e6" stroke-width="14" opacity=".95"/>
  <rect x="62" y="62" width="388" height="388" rx="44" fill="none"
    stroke="#f5f0e6" stroke-width="5" opacity=".55"/>

  <!-- 刻 -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="central"
    font-family="'Songti TC','Noto Serif TC','STSong',serif"
    font-size="268" font-weight="900" fill="#f5f0e6">刻</text>

  <!-- 落款小印：一 -->
  <rect x="356" y="372" width="58" height="58" rx="10" fill="#f5f0e6"/>
  <text x="385" y="402" text-anchor="middle" dominant-baseline="central"
    font-family="'Songti TC','Noto Serif TC',serif"
    font-size="38" font-weight="900" fill="#b65c38">一</text>
</svg>
