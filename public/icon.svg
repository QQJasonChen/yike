<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="paper" cx="35%" cy="25%" r="90%">
      <stop offset="0%" stop-color="#faf6ec"/>
      <stop offset="70%" stop-color="#f3edde"/>
      <stop offset="100%" stop-color="#eae2cd"/>
    </radialGradient>
  </defs>

  <!-- 紙 -->
  <rect width="512" height="512" rx="100" fill="url(#paper)"/>

  <!-- 墨圈（塗圈的那一筆）：主筆 + 疊筆做出毛筆感 -->
  <g transform="rotate(-100 248 252)">
    <circle cx="248" cy="252" r="152" fill="none" stroke="#2b2620"
      stroke-width="50" stroke-linecap="round"
      stroke-dasharray="811 144"/>
    <circle cx="251" cy="249" r="148" fill="none" stroke="#241f1a"
      stroke-width="26" stroke-linecap="round"
      stroke-dasharray="760 170" opacity=".75"/>
    <!-- 起筆飛白 -->
    <circle cx="248" cy="252" r="160" fill="none" stroke="#2b2620"
      stroke-width="10" stroke-linecap="round"
      stroke-dasharray="60 945" opacity=".45"/>
  </g>

  <!-- 圈心一點金：今天刻下的那件事 -->
  <circle cx="248" cy="252" r="26" fill="#b8923e"/>

  <!-- 日刻印章 -->
  <g>
    <rect x="350" y="350" width="112" height="112" rx="14" fill="#b65c38"/>
    <rect x="357" y="357" width="98" height="98" rx="9" fill="none" stroke="#f5f0e6" stroke-width="4" opacity=".9"/>
    <text x="406" y="396" text-anchor="middle" font-family="'Songti TC','Noto Serif TC',serif"
      font-size="40" font-weight="900" fill="#f5f0e6">日</text>
    <text x="406" y="442" text-anchor="middle" font-family="'Songti TC','Noto Serif TC',serif"
      font-size="40" font-weight="900" fill="#f5f0e6">刻</text>
  </g>
</svg>
