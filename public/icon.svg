<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="paper" cx="38%" cy="28%" r="95%">
      <stop offset="0%" stop-color="#fbf7ee"/>
      <stop offset="65%" stop-color="#f3edde"/>
      <stop offset="100%" stop-color="#e8dfc8"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#332d25"/>
      <stop offset="100%" stop-color="#1f1b15"/>
    </linearGradient>
  </defs>

  <!-- 紙 -->
  <rect width="512" height="512" rx="100" fill="url(#paper)"/>

  <!-- 墨圈：一筆塗下去的圓，開口在右上（將完成、未完成） -->
  <g transform="rotate(-58 256 256)">
    <!-- 主筆 -->
    <circle cx="256" cy="256" r="158" fill="none" stroke="url(#ink)"
      stroke-width="58" stroke-linecap="round" stroke-dasharray="868 125"/>
    <!-- 筆鋒厚度變化 -->
    <circle cx="259" cy="253" r="154" fill="none" stroke="#2b2620"
      stroke-width="30" stroke-linecap="round" stroke-dasharray="800 168" opacity=".65"/>
    <!-- 收筆飛白（兩道細線掃出） -->
    <circle cx="256" cy="256" r="172" fill="none" stroke="#2b2620"
      stroke-width="7" stroke-linecap="round" stroke-dasharray="80 1001" opacity=".4"/>
    <circle cx="256" cy="256" r="143" fill="none" stroke="#2b2620"
      stroke-width="6" stroke-linecap="round" stroke-dasharray="64 835" opacity=".3"/>
  </g>

  <!-- 圈心一點金：今天刻下的那一件事 -->
  <circle cx="256" cy="256" r="34" fill="#b8923e"/>
  <circle cx="247" cy="247" r="10" fill="#d9b96a" opacity=".8"/>
</svg>
